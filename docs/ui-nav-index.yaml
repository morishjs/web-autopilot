# web-auto nav-index
# 각 블록은 URL 패턴과 CSS 셀렉터를 매핑합니다.
# extract 명령이 이 셀렉터를 사용하여 구조화된 데이터를 추출합니다.

# ============================================================
# 기본 구조
# ============================================================

# 블록명:
#   url: https://example.com/path/*        # 와일드카드 매칭
#   selectors:                              # CSS 셀렉터 (extract용)
#     title: h1
#     body: article .prose
#     items: .list-item
#   api:                                    # API 엔드포인트 (eval에서 fetch용)
#     data: https://example.com/api/data?id={id}
#   # 주석으로 페이지 구조, 주의사항 기록

# ============================================================
# 예시: 뉴스 사이트
# ============================================================

# news-article:
#   url: https://news.example.com/articles/*
#   selectors:
#     title: h1.article-title
#     author: .byline .author-name
#     date: time[datetime]
#     body: .article-body
#     tags: .tag-list a

# ============================================================
# 예시: SPA (Single Page Application)
# ============================================================

# spa-dashboard:
#   url: https://app.example.com/dashboard*
#   # SPA는 table 태그 없이 div 기반 레이아웃인 경우가 많음
#   # eval로 body.innerText 파싱 또는 API 직접 호출 필요
#   api:
#     metrics: https://app.example.com/api/metrics?range={range}
#     chart: https://app.example.com/api/chart?keys={keys}

# ============================================================
# 예시: iframe 기반 사이트
# ============================================================

# iframe-viewer:
#   url: https://viewer.example.com/*
#   eval: "document.querySelector('iframe#mainFrame')?.contentDocument?.body?.innerText"

# ============================================================
# Notion 페이지
# ============================================================

notion-page:
  url: https://www.notion.so/*
  selectors:
    title: ".notion-page-block .notranslate"
    content: ".notion-page-content"
    properties: ".notion-collection_view-block"

# ============================================================
# Experdy - 예약 캘린더
# ============================================================

# React SPA (Vite + TanStack Query). API는 /v2/ 접두사.
# 가상스크롤 없음. 캘린더는 시간축 기반 그리드.
# 예약 블록 클릭 → 사이드 패널 열림. 수정 버튼 → 예약 수정 모달.
experdy-reservation:
  url: https://dev.experdy.com/reservation*
  api:
    stay-calendar: https://dev.experdy.com/api/v2/stay/calendar/{date}
    update-reservation: https://dev.experdy.com/api/v2/reservations/{reservationId}
